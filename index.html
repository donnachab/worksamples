<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donnacha Bushe - Senior Technical Writer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script>
        const springPalette = {
            'cv-bg-base': '#f0fdf4',
            'cv-bg-main': '#ffffff',
            'cv-bg-sidebar': '#dcfce7',
            'cv-text-dark': '#14532d',
            'cv-text-med': '#166534',
            'cv-text-dim': '#15803d',
            'cv-accent': '#22c55e',
            'cv-border': '#86efac'
        };

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] },
                    colors: springPalette
                }
            }
        };

        const registry = {
            identity: {
                name: "DONNACHA BUSHE",
                title: "Senior Technical Writer | PSM I Certified",
                summary: `
                    <p class="mb-4">I am a senior technical writer with 25 years of experience improving complex documentation environments through content remediation, information architecture, and scalable content strategy.</p>
                    <p class="mb-4">I specialize in turning fragmented technical information into clear, structured, task-based documentation that improves usability and helps people do their jobs effectively. My work includes leading content migrations, improving documentation standards, and working closely with engineering teams to support docs-as-code workflows.</p>
                    <p class="mb-4">I am particularly effective at quickly understanding complex technical material, collaborating across stakeholders, and bringing structure to content that has become inconsistent or difficult to maintain. I combine strong communication, sound technical judgment, and a clear user focus to produce documentation that is accurate, scalable, and useful.</p>
                    <p class="mb-4 text-cv-text-dark font-medium italic">Most recently, I completed a senior technical writer interview process with a large enterprise technology company that advanced to compensation and start-date discussions before a department-wide hiring freeze halted the role.</p>
                    <p>I use AI to speed up the gathering and analysis of technical information, while remaining responsible for final accuracy, clarity, and editorial quality.</p>
                `
            },
            contact: {
                location: "Galway, Ireland",
                phone: "+353 85 7071293",
                email: "donnachab@gmail.com",
                linkedin: "linkedin.com/in/donnachab",
                portfolio: "https://donnachab.github.io/worksamples/worksamples.html",
                onlineCV: "https://donnachab.github.io/worksamples/index.html"
            },
            experience: [
                {
                    company: "intive",
                    period: "July 2017 – December 2025 (8 years 6 months)",
                    role: "Senior Technical Writer and Writing Consultant",
                    bullets: [
                        "<strong>Client: DT One — Developer Portal</strong>: Rebuilt the developer portal in three months, replacing unsearchable PowerPoints and raw Swagger files with a coherent, developer‑oriented site. Designed a consistent integration structure that added the context, flows, and examples developers needed to onboard independently.",
                        "<strong>Client: Ericsson — ENM Product Description (DITA Architecture & Governance)</strong>: Rebuilt the ENM Product Description during the Confluence‑to‑Ixiasoft migration, resolving navigation and content gaps, standardizing chapter depth, aligning structure with the portal UI, applying reuse (RCO/conref/keyref), and cleaning automated conversion output. Worked with a Senior Architect to set a firm review deadline, enabling approved changes to move into production across 50 distributed teams.",
                        "<strong>Client: Ericsson — Pipeline Orchestration Service</strong>: Restructured a haphazard help portal by role, separating guides for pipeline developers, internal tool developers, and supply teams. Introduced DITA‑like Markdown templates and writing guidelines to counter unmanaged Markdown, keeping documentation structured and self‑sustaining through Gerrit reviews.",
                        "<strong>Client: Ericsson — API Workflow Automation</strong>: Piloted Swagger‑to‑Git synchronization with a distributed team in Italy, addressing skepticism about writers working in the codebase by demonstrating a reliable workflow. Partnered with product leadership to secure buy‑in for modern Docs‑as‑Code practices.",
                        "<strong>Client: Ericsson — Developer Experience</strong>: Built documentation blueprints for the Internal Development Platform (IDP), ensuring new service repositories were searchable, structured, and documented‑by‑default.",
                        "<strong>Client: Ericsson — Mentorship & Quality Assurance</strong>: Led rotating quality‑review circles to mentor writers and raise editorial consistency across teams.",
                        "<strong>Internal: Strategic Prototyping</strong>: Self-taught Figma to design and present structural prototypes that improved project transparency and shaped early delivery decisions."
                    ],
                    skills: ["Technical Content Remediation", "Information Architecture", "Docs-as-Code Methodology", "Content Strategy", "Stakeholder Management", "DITA XML", "GIT", "Backstage", "Markdown", "Content Management Systems (CMS)", "DITA CMS", "User Experience (UX)", "Design Thinking", "Technical Writing", "Agile Methodologies", "Scrum", "DevOps", "CI CD", "Jenkins", "Documentation Reuse", "User Research", "Web Content Writing", "Technical Documentation", "Style Guides", "Online Help Development", "Online Help", "Release Notes", "Manuals", "Software Testing", "Mentoring", "Training", "Teaching", "Project Management", "Research and Development (R&D)", "Public Speaking", "Jira", "Confluence", "Visual Design", "HTML", "SaaS", "Copywriting"]
                },
                {
                    company: "SAP",
                    period: "March 2005 – July 2015 (10 years 5 months)",
                    role: "Senior Information Developer",
                    bullets: [
                        "Promoted twice in four years: Information Developer → Specialist → Senior",
                        "<strong>Help Portal Strategy & User Research</strong>: Redesigned the SAP Help Portal by conducting on‑site user research in Kentucky and collaborating with a lead in Bulgaria. Advocated for context‑aware, role‑based navigation grounded in direct customer feedback, influencing principles later reflected in the SAP Fiori user experience.",
                        "<strong>System Stability Initiative (Knowledge Transfer Platform)</strong>: Assigned to document the new KTP CMS but found it too unstable for reliable authoring. Established a public triage page for workarounds, authored a repeatable Test Plan executed for every release, and led an intern team to run repeated test cases until stability improved.",
                        "<strong>Linguistic Standardization (Master Data Governance)</strong>: Resolved terminology deadlocks in MDG by standardizing governance vocabulary and renaming long, user‑hostile UI labels to concise terms, replacing “Entity Attribute Change Relevance Indicator” with “Governed.”",
                        "<strong>Documentation Architecture (A1S / Business ByDesign)</strong>: Designed the documentation architecture for the IT System and Application Management component of A1S. Built standardized resolution templates for global support centers, establishing the baseline support strategy ahead of the product’s first market release."
                    ],
                    skills: ["Information Architecture", "User Research", "Design Thinking", "Linguistic Standardization", "CMS Strategy", "System Stability", "Terminology Management", "Global Collaboration"]
                },
                {
                    company: "Skillsoft",
                    period: "March 2001 – February 2005 (4 years)",
                    role: "Technical Writer",
                    bullets: [
                        "Trained by a dedicated editorial team to transform raw technical data into polished content—a foundation that enables me to effectively restructure developer drafts today.",
                        "Applied instructional design principles to design, develop, and deliver training. Courses consisted of articles, interactive demonstrations, simulations, and assessments.",
                        "Led planning meetings with graphic designers, and subject matter experts."
                    ]
                },
                {
                    company: "Aviva",
                    period: "August 1997 – January 2001 (3 years 6 months)",
                    role: "Programmer",
                    bullets: ["Wrote COBOL and ABAP code, provided telephone support to users, and completed daily system maintenance tasks."]
                }
            ],
            education: [
                { degree: "HDip Information Technology (Hons)", school: "NUI Maynooth" },
                { degree: "BA French & History (Hons)", school: "Trinity College Dublin" }
            ],
            topSkills: ["Technical Content Remediation", "Information Architecture", "Docs-as-Code Methodology", "Stakeholder Management"],
            toolbox: ["Backstage", "DITA XML", "Ixiasoft", "Git", "Markdown", "Swagger", "Figma", "Gerrit", "Jira", "Confluence", "ABAP", "COBOL"],
            interests: ["Playwright (produced at Town Hall Theatre, Galway)", "Camino de Santiago (French Way)", "Singer with the Galway Jam Circle"]
        };

        function printCV() {
            document.querySelectorAll('.skill-hidden').forEach(el => el.style.display = 'inline-block');
            document.querySelectorAll('.skill-toggle-btn').forEach(btn => btn.style.display = 'none');
            window.print();
        }
    </script>
    <style>
        :root { --accent: #22c55e; --dark: #14532d; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0fdf4; 
            color: #166534; 
            -webkit-font-smoothing: antialiased;
        }

        @media (min-width: 1024px) {
            .grid-lg { display: grid !important; grid-template-columns: 320px 1fr; grid-template-areas: "aside main"; max-width: 1200px; margin: 40px auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
            .grid-lg > main { grid-column: 2 / 3; order: 2; padding: 40px 60px; }
            .grid-lg > aside { grid-column: 1 / 2; order: 1; background: #dcfce7; padding: 40px; border-right: 1px solid #86efac; }
        }

        .timeline-item { position: relative; padding-left: 1.5rem; border-left: 2px solid #86efac; margin-bottom: 2.5rem; }
        .badge { background-color: #ffffff; border: 1px solid #86efac; color: #14532d; font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; display: inline-block; margin: 2px; }
        
        .skill-hidden { display: none; }
        .skill-toggle-btn { color: #22c55e; cursor: pointer; font-size: 0.75rem; font-weight: 700; }

        @media print {
            /* 1. STRICT MARGINS: Keeps text completely away from page edges */
            @page { size: A4; margin: 15mm 20mm; } 
            
            /* 2. INTEGER FONT SIZES & STRIPPED OVERRIDES: Prevents Chrome's PDF renderer from wobbling text */
            body { 
                background: white !important; 
                color: #000000 !important; 
                font-size: 10pt !important; 
                margin: 0 !important; 
                padding: 0 !important; 
            }
            
            * {
                -webkit-transition: none !important;
                transition: none !important;
                -webkit-transform: none !important;
                transform: none !important;
                text-shadow: none !important;
                box-shadow: none !important;
            }

            /* Prevent opacity from forcing the browser to rasterize the text (causing blur/wobble) */
            .opacity-80 { opacity: 1 !important; color: #374151 !important; }

            .no-print { display: none !important; }
            .grid-lg { display: block !important; width: 100% !important; margin: 0 !important; border-radius: 0 !important; border: none !important; }
            
            /* 3. CONTAINED BANNER: Will not cut off or truncate */
            header { 
                background-color: #dcfce7 !important; 
                padding: 15pt 25pt !important; 
                border-radius: 8px !important;
                border: 1px solid #86efac !important;
                border-bottom: 3px solid #22c55e !important;
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
                margin-bottom: 20pt !important;
            }

            .header-photo { display: block !important; width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; }
            
            main { padding: 0 !important; }
            
            /* 4. SURGICAL PAGE BREAKS */
            h2, h3 { break-after: avoid; page-break-after: avoid; margin-top: 15pt; margin-bottom: 8pt; }
            .timeline-item { break-inside: auto; page-break-inside: auto; border-left: none !important; padding-left: 0 !important; margin-bottom: 15pt !important; }
            
            /* NEVER split a single bullet across a page break */
            li { break-inside: avoid !important; page-break-inside: avoid !important; margin-bottom: 8pt !important; }
            
            /* Keep headers locked to their content */
            .timeline-item h3 + p, .timeline-item h3 + ul { break-before: avoid; }
            
            aside { display: block; border-top: 1.5pt solid #86efac; margin-top: 25pt !important; padding: 15pt 0 !important; background: transparent !important; }
            .small-job, .edu-section, .interest-section { page-break-inside: avoid; break-inside: avoid; }
            
            .skill-hidden { display: inline-block !important; }
            a { color: #166534 !important; text-decoration: underline !important; font-weight: 700; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 lg:p-8">

    <div class="max-w-6xl mx-auto flex flex-col grid-lg">

        <main class="w-full bg-white">
            <header class="mb-8 border-b border-cv-border pb-6 flex justify-between items-center">
                <div class="text-left">
                    <h1 class="text-3xl font-bold font-heading text-cv-text-dark uppercase tracking-tight">DONNACHA BUSHE</h1>
                    <p class="text-sm font-semibold text-cv-accent mt-1 uppercase">Senior Technical Writer | PSM I Certified</p>
                    <div class="hidden print:flex flex-col gap-1 mt-3">
                        <a href="https://donnachab.github.io/worksamples/index.html" class="text-[10pt]">View Online Interactive CV</a>
                        <a href="https://donnachab.github.io/worksamples/worksamples.html" class="text-[10pt]">View Work Samples Portfolio</a>
                    </div>
                </div>
                <img src="https://raw.githubusercontent.com/donnachab/worksamples/main/profile-pic.jpg" class="header-photo hidden print:block w-20 h-20 rounded-full border-4 border-cv-accent object-cover">
                <div class="flex gap-2 no-print">
                     <a href="https://donnachab.github.io/worksamples/worksamples.html" target="_blank" class="px-5 py-2.5 border border-cv-accent text-xs font-bold rounded text-white bg-cv-accent hover:bg-cv-accent-hover transition-all shadow-md">WORK SAMPLES</a>
                     <button onclick="printCV()" class="px-5 py-2.5 border border-cv-accent text-xs font-bold rounded text-white bg-cv-accent hover:bg-cv-accent-hover transition-all shadow-md">PRINT TO PDF</button>
                </div>
            </header>

            <section class="mb-10"><div id="summary-content" class="text-cv-text-med leading-relaxed text-sm"></div></section>
            
            <section>
                <h2 class="text-xs font-bold text-cv-text-dark uppercase tracking-widest border-b border-cv-accent pb-1 mb-8">Professional Experience</h2>
                <div id="experience-content"></div>
            </section>
        </main>

        <aside class="w-full">
            <div class="no-print mb-8 text-center">
                <img src="https://raw.githubusercontent.com/donnachab/worksamples/main/profile-pic.jpg" alt="Donnacha Bushe" class="w-24 h-24 rounded-full mx-auto border-4 border-cv-accent object-cover bg-white shadow-sm">
            </div>
            
            <section class="mb-8"><h2 class="text-xs font-bold text-cv-text-dark uppercase border-b border-cv-border pb-1 mb-4">Contact</h2>
                <div id="sidebar-contact" class="text-xs space-y-1 text-cv-text-dark italic"></div>
            </section>

            <section class="mb-8"><h2 class="text-xs font-bold text-cv-text-dark uppercase border-b border-cv-border pb-1 mb-4">Top Skills</h2>
                <ul id="sidebar-skills" class="text-xs space-y-1 font-medium"></ul>
            </section>

            <section class="mb-8"><h2 class="text-xs font-bold text-cv-text-dark uppercase border-b border-cv-border pb-1 mb-4">Toolbox</h2>
                <div id="sidebar-toolbox" class="flex flex-wrap gap-1"></div>
            </section>

            <section class="mb-8 edu-section"><h2 class="text-xs font-bold text-cv-text-dark uppercase border-b border-cv-border pb-1 mb-4">Education</h2>
                <div id="sidebar-education" class="text-xs space-y-3"></div>
            </section>

            <section class="mb-8 interest-section"><h2 class="text-xs font-bold text-cv-text-dark uppercase border-b border-cv-border pb-1 mb-4">Interests</h2>
                <ul id="sidebar-interests" class="text-xs space-y-1 font-medium"></ul>
            </section>
        </aside>

    </div>

    <script>
        function toggleSkills(id) {
            const el = document.getElementById(id);
            const btn = el.nextElementSibling;
            const isHidden = el.style.display === 'none' || el.style.display === '';
            el.style.display = isHidden ? 'inline-block' : 'none';
            btn.innerText = isHidden ? 'Show less' : '...and more';
        }

        function render() {
            const d = registry;
            document.getElementById('summary-content').innerHTML = d.identity.summary;
            document.getElementById('sidebar-contact').innerHTML = `
                <p>${d.contact.location}</p>
                <p class="font-bold underline">${d.contact.phone}</p>
                <p class="underline">${d.contact.email}</p>
                <a href="https://${d.contact.linkedin}" target="_blank" class="block underline">LinkedIn Profile</a>
                <a href="${d.contact.portfolio}" target="_blank" class="block font-bold text-cv-accent underline mt-1">Work Samples Portfolio</a>
            `;

            document.getElementById('experience-content').innerHTML = d.experience.map((job, idx) => {
                const isSmall = job.bullets.length < 4;
                const visibleSkills = job.skills ? job.skills.slice(0, 5) : [];
                const hiddenSkills = job.skills ? job.skills.slice(5) : [];
                
                return `
                    <div class="timeline-item ${isSmall ? 'small-job' : ''}">
                        <div class="flex justify-between items-baseline mb-1">
                            <h3 class="text-md font-bold text-cv-text-dark">${job.company}</h3>
                            <span class="text-[10px] font-bold text-cv-text-dim uppercase tracking-wider">${job.period}</span>
                        </div>
                        <p class="text-xs font-bold text-cv-accent mb-4 uppercase tracking-wide italic underline underline-offset-4 decoration-cv-border">${job.role}</p>
                        <ul class="list-disc space-y-3 pl-5 text-sm text-cv-text-med">
                            ${job.bullets.map(b => `<li>${b}</li>`).join('')}
                        </ul>
                        ${job.skills ? `
                        <div class="mt-4 no-print">
                            ${visibleSkills.map(s => `<span class="badge">${s}</span>`).join('')}
                            <span id="skills-${idx}" class="skill-hidden">${hiddenSkills.map(s => `<span class="badge">${s}</span>`).join('')}</span>
                            ${hiddenSkills.length > 0 ? `<span class="skill-toggle-btn" onclick="toggleSkills('skills-${idx}')">...and more</span>` : ''}
                        </div>
                        <div class="hidden print:block mt-2">
                             <p class="text-[8.5pt] font-bold text-cv-text-dark uppercase italic">Skills: ${job.skills.join(', ')}</p>
                        </div>` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('sidebar-skills').innerHTML = d.topSkills.map(s => `<li>• ${s}</li>`).join('');
            document.getElementById('sidebar-toolbox').innerHTML = d.toolbox.map(t => `<span class="badge border px-2 py-1 rounded text-[10px] font-bold uppercase">${t}</span>`).join('');
            document.getElementById('sidebar-education').innerHTML = d.education.map(e => `<div class="mb-2"><p class="font-bold leading-tight">${e.school}</p><p class="opacity-80 italic">${e.degree}</p></div>`).join('');
            document.getElementById('sidebar-interests').innerHTML = d.interests.map(i => `<li>• ${i}</li>`).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
